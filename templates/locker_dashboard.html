{% extends "home.html" %}

{% block content %}
<section class="panel">
    <div>
        <div>
            <p class="subtext">PIA Service Desk</p>
            <h2>Service Desk Dashboard</h2>
            <p class="subtext">Welcome, {{ session.get('username') }}. Log issues, create service memos, and monitor technical handling.</p>
        </div>
        <span class="chip">Active Workspace</span>
    </div>

    <div class="actions">
        <a class="btn" href="{{ url_for('complaint_routes.create_service_memo') }}"><i class="ri-file-add-line"></i>New Service Memo</a>
        <a class="btn" href="{{ url_for('complaint_routes.locker_service_memos') }}"><i class="ri-folder-open-line"></i>View Service Memos</a>
        <a class="btn ghost" href="{{ url_for('complaint_routes.locker_complaints') }}"><i class="ri-search-eye-line"></i>Review Complaints</a>
    </div>
</section>
{% endblock %}
