{% extends "home.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card panel">
        <div>
            <p class="subtext">PIA Access Portal</p>
            <h2 class="auth-title">Crew Login</h2>
            <p class="subtext">Access Pakistan International Airlines service desk operations panel.</p>
        </div>

        <form method="POST">
            <div>
                <label>Email</label>
                <input type="email" name="email" placeholder="Example: user@pia.com.pk" required>
            </div>

            <div>
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary"><i class="ri-login-circle-line"></i>Login</button>
        </form>

        <p class="bottom-text">Need an account? Contact admin to create user access.</p>
    </div>
</div>
{% endblock %}
