{% extends "home.html" %}
{% block content %}

<h2>Create Service Memo</h2>

<form method="POST">
    <label>Complain No</label><br>
    <input type="text" name="complain_no" required><br><br>

    <label>Location</label><br>
    <input type="text" name="location"><br><br>

    <label>Ext No</label><br>
    <input type="text" name="ext_no"><br><br>

    <label>Staff No</label><br>
    <input type="text" name="staff_no"><br><br>

    <label>IP Address</label><br>
    <input type="text" name="ip_address"><br><br>

    <label>Device Type</label><br>
    <select name="product_name" required>
        <option value="">Select device type</option>
        <option value="laptop">Laptop</option>
        <option value="desktop">Desktop</option>
        <option value="printer">Printer</option>
        <option value="scanner">Scanner</option>
        <option value="network">Network</option>
        <option value="other">Other</option>
    </select><br><br>

    <label>Model</label><br>
    <input type="text" name="model"><br><br>

    <label>Serial No</label><br>
    <input type="text" name="serial_no"><br><br>

    <label>RAM</label><br>
    <input type="text" name="ram"><br><br>

    <label>HDD</label><br>
    <input type="text" name="hdd"><br><br>

    <label>L/N IATA</label><br>
    <input type="text" name="lniata"><br><br>

    <label>Date In</label><br>
    <input type="date" name="date_in"><br><br>

    <label>Status</label><br>
    <input type="text" name="status" value="pending"><br><br>

    <label>User Details</label><br>
    <textarea name="user_details" rows="4"></textarea><br><br>

    <label><input type="checkbox" name="fault"> Fault</label><br>
    <label><input type="checkbox" name="data_backup"> Data Backup</label><br><br>

    <p><strong>Note:</strong> Diagnosed and Date Out will be filled by technician.</p><br>

    <button type="submit" class="btn">Submit Service Memo</button>
</form>

<br>
<a href="{{ url_for('complaint_routes.locker_service_memos') }}">Back to Service Memos</a>
<a href="{{ url_for('main_routes.locker_dashboard') }}" class="btn">Locker Dashboard</a>

{% endblock %}
